<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>فك الروابط</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Tajawal',sans-serif;
}

body{
    background:#000;
    color:#fff;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    position:relative;
}

body::before{
    content:"";
    position:absolute;
    width:700px;
    height:700px;
    background:radial-gradient(circle,#ffffff15,transparent 70%);
    top:-200px;
    right:-200px;
}

body::after{
    content:"";
    position:absolute;
    width:600px;
    height:600px;
    background:radial-gradient(circle,#ffffff10,transparent 70%);
    bottom:-250px;
    left:-250px;
}

.container{
    width:95%;
    max-width:850px;
    background:#0f0f0f;
    border:1px solid #222;
    border-radius:30px;
    padding:40px;
    position:relative;
    z-index:2;
    box-shadow:
    0 0 30px #ffffff10,
    inset 0 0 30px #ffffff08;
    backdrop-filter:blur(10px);
}

.logo{
    text-align:center;
    margin-bottom:35px;
}

.logo h1{
    font-size:55px;
    font-weight:900;
    letter-spacing:2px;
    color:#fff;
    text-shadow:0 0 20px #ffffff30;
}

.logo p{
    color:#aaa;
    margin-top:10px;
    font-size:18px;
}

.inputBox{
    position:relative;
    margin-bottom:20px;
}

.inputBox input{
    width:100%;
    background:#050505;
    border:2px solid #1f1f1f;
    outline:none;
    color:#fff;
    padding:20px;
    border-radius:18px;
    font-size:18px;
    transition:0.3s;
}

.inputBox input:focus{
    border-color:#fff;
    box-shadow:0 0 25px #ffffff25;
}

.inputBox input::placeholder{
    color:#777;
}

button{
    width:100%;
    border:none;
    background:#fff;
    color:#000;
    padding:18px;
    border-radius:18px;
    font-size:20px;
    font-weight:900;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.02);
    box-shadow:0 0 30px #ffffff40;
}

.loading{
    display:none;
    text-align:center;
    margin-top:25px;
    color:#ccc;
    font-size:18px;
    animation:fade 1s infinite alternate;
}

@keyframes fade{
    from{
        opacity:0.4;
    }
    to{
        opacity:1;
    }
}

.output{
    margin-top:25px;
    display:none;
}

.output textarea{
    width:100%;
    min-height:300px;
    background:#050505;
    border:2px solid #1f1f1f;
    color:#fff;
    padding:20px;
    border-radius:20px;
    resize:none;
    font-size:15px;
    outline:none;
}

.copyBtn{
    margin-top:15px;
    background:#111;
    color:#fff;
    border:1px solid #333;
}

.copyBtn:hover{
    background:#fff;
    color:#000;
}

.footer{
    text-align:center;
    margin-top:25px;
    color:#666;
    font-size:14px;
}

.glow{
    position:absolute;
    width:200px;
    height:200px;
    background:#fff;
    filter:blur(150px);
    opacity:0.05;
    border-radius:50%;
}

.glow1{
    top:0;
    left:0;
}

.glow2{
    bottom:0;
    right:0;
}
</style>
</head>

<body>

<div class="glow glow1"></div>
<div class="glow glow2"></div>

<div class="container">

<div class="logo">
<h1>فك الروابط</h1>
<p>حط الرابط وخله علينا 😎</p>
</div>

<div class="inputBox">
<input 
type="text" 
id="urlInput" 
placeholder="حط الرابط هنا..."
autocomplete="off"
/>
</div>

<button onclick="fetchRaw()">فك الرابط</button>

<div class="loading" id="loading">
انتظر شوي...
</div>

<div class="output" id="outputBox">
<textarea id="result" readonly></textarea>

<button class="copyBtn" onclick="copyText()">
نسخ السكربت
</button>
</div>

<div class="footer">
يدعم فقط Lua و Luau
</div>

</div>

<script>
async function fetchRaw(){

    const url = document.getElementById("urlInput").value.trim();
    const loading = document.getElementById("loading");
    const outputBox = document.getElementById("outputBox");
    const result = document.getElementById("result");

    if(!url){
        alert("حط الرابط اول");
        return;
    }

    loading.style.display = "block";
    outputBox.style.display = "none";

    try{

        const response = await fetch(url);

        if(!response.ok){
            throw new Error("فشل تحميل الرابط");
        }

        const text = await response.text();

        loading.style.display = "none";
        outputBox.style.display = "block";

        result.value = text;

    }catch(err){

        loading.style.display = "none";

        alert("الرابط خربان او ما يدعم Raw");

    }
}

function copyText(){

    const text = document.getElementById("result");

    text.select();
    text.setSelectionRange(0,999999);

    navigator.clipboard.writeText(text.value);

}
</script>

</body>
</html>
